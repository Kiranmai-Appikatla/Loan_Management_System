spring.datasource.url=${SAFEHAVEN_DB_URL:jdbc:mysql://localhost:3306/safehaven_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SAFEHAVEN_DB_USERNAME:root}
spring.datasource.password=${SAFEHAVEN_DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
server.port=8080
server.error.include-message=always
safehaven.jwt.secret=${SAFEHAVEN_JWT_SECRET:SafeHavenSecretKeySafeHavenSecretKey2026!}
safehaven.jwt.expiration-ms=86400000
